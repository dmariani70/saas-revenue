<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SaaS Revenue</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">📊 SaaS Revenue</div>
      <div class="login-sub">Sign in with your username and password</div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password" required>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
