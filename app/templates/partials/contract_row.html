<tr id="contract-row-{{ c.id }}">
  <td>{{ c.bank.name }}</td>
  <td>{{ c.version }}</td>
  <td>{{ c.effective_from }}</td>
  <td class="num">$ {{ "{:,.2f}".format(c.min_monthly_fee) }}</td>
  <td style="font-size:12px">
    {% for t in c.pricing_tiers %}
    ≤ {{ "{:,.0f}".format(t.upper_bound) }} → ${{ t.fee_per_tx }}{% if not loop.last %} | {% endif %}
    {% endfor %}
  </td>
  {% if user.role == 'admin' %}
  <td style="white-space:nowrap">
    <a class="btn btn-sm" href="/contracts/{{ c.id }}/edit">Edit</a>
    <button class="btn btn-sm btn-danger" type="button"
      hx-delete="/contracts/{{ c.id }}/delete"
      hx-target="#contract-row-{{ c.id }}"
      hx-swap="outerHTML swap:1s"
      onclick="return confirm('Delete this contract?')">Delete</button>
  </td>
  {% endif %}
</tr>
